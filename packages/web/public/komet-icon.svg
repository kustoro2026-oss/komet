<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <!-- Comet/Star shape -->
  <g transform="translate(512,512)">
    <!-- Main star -->
    <polygon points="0,-280 66,-90 280,-90 106,34 172,224 0,110 -172,224 -106,34 -280,-90 -66,-90"
             fill="white" opacity="0.95"/>
    <!-- Comet tail -->
    <ellipse cx="280" cy="80" rx="320" ry="32" fill="white" opacity="0.6"
             transform="rotate(-25)"/>
    <ellipse cx="360" cy="120" rx="200" ry="18" fill="white" opacity="0.35"
             transform="rotate(-25)"/>
    <ellipse cx="420" cy="150" rx="120" ry="10" fill="white" opacity="0.18"
             transform="rotate(-25)"/>
    <!-- Small sparkle dots -->
    <circle cx="-60" cy="-200" r="12" fill="white" opacity="0.7"/>
    <circle cx="200" cy="-160" r="8" fill="white" opacity="0.5"/>
    <circle cx="-200" cy="160" r="10" fill="white" opacity="0.4"/>
  </g>
</svg>
